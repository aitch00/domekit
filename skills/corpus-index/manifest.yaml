skill: corpus-index
version: 0.2.0
type: atom-dominio
domain: method          # atomo universale: indicizza qualunque corpus di handoff-artifact
category: corpus-indexing

implements:
  - principle: 03-principio-atomi
    version: 1.0.0
    status: in-sync
  - principle: 02-principio-handoff
    version: 1.1.0
    status: in-sync

implements_patterns:
  - pattern: 01-orchestratore-multi-agente
    version: 1.1.0
  - pattern: 06-triage-complessita
    version: 1.1.0

modes:
  - guided
  - yolo
  - headless

triage:
  signals:
    - name: volume_documenti
      weight: 0.5
      thresholds: { lightweight: "<=3", standard: "4-12", deep: ">=13" }
    - name: elementi_stimati
      weight: 0.5
      thresholds: { lightweight: "<60", standard: "60-200", deep: ">200" }
  thresholds:
    lightweight: "<0.4"
    standard: "0.4-0.7"
    deep: ">0.7"
  actions:
    lightweight:
      delegation_policy: in-thread
    standard:
      delegation_policy: selective
    deep:
      delegation_policy: mandatory
  default: standard
  propagation: upfront

io_schema:
  input:
    - field: corpus_dir
      type: path
      required: true        # la cartella da scansionare
    - field: stamp
      type: bool
      required: false       # se true, riscrive gli anchor mancanti nei doc legacy
  output:
    - artifact: corpus-index
      format: markdown
      schema: handoff-v1
      path: docs/dome/corpus-index/corpus-index-<slug>.md   # nel corpus dome, mai dentro la corpus-dir

agents:
  - name: index-worker
    mode: conditional
    role: per-document-indexing
    trigger: delegation_policy != in-thread
  - name: coverage-reconciler
    mode: always-on
    role: extractor-coverage-safety-net

consumes_databases: []

handoff:
  enabled: true
  downstream:
    - dm:blueprint
    - dm:product

harvest_policy:
  domain: opt-in
  solution: opt-in
  method: opt-in

status: in-sync
evolution_log:
  - version: 0.2.0
    date: 2026-06-19
    type: minor
    summary: >
      Path di output dichiarato: il corpus-index si scrive sempre in
      docs/dome/corpus-index/corpus-index-<slug>.md, mai dentro la corpus-dir analizzata
      (feedback utente: l'indice finiva nella cartella indicizzata, inquinando le sorgenti
      e rischiando di essere ri-indicizzato come sorgente al re-run). Allinea corpus-index
      alla disciplina B3 di AGENTS.md (output durevoli in docs/dome/) e alle altre skill
      che hardcodano la destinazione. io_schema.output.path popolato; Stadio 4, Output e
      Regole aggiornati. Override solo su path esplicito dell'utente.
  - version: 0.1.0
    date: 2026-06-09
    type: initial
    summary: >
      Prima versione. Atomo universale che indicizza un corpus di handoff-artifact:
      scan ibrido (glob + type/role), indicizzazione con anchor-ID stabili
      (<doc-id>#<kind>.<anchor>, convenzione 02-principio-handoff@1.1.0), stamp dei
      doc legacy, riconciliazione LLM come rete di sicurezza dell'extractor coverage,
      output corpus-index con delta e staleness. Delega per-documento sopra soglia
      (06-triage-complessita, delegation_policy). Estratto da dm:blueprint (Stadio 1)
      e validato sullo spike v4m (0 collisioni a 254 elementi). Piano dm:blueprint v0.3.
