skill: dm-journeys
version: 0.7.0
type: atom-dominio
domain: design          # verticale: design/UX research (collocata in .claude/skills come comando dm-*)
category: ux-research

implements:
  - principle: 03-principio-atomi
    version: 1.1.0
    status: in-sync
  - principle: 02-principio-handoff
    version: 1.1.0
    status: in-sync

modes:
  - guided
  - yolo
  - headless

io_schema:
  input:
    - field: scenario_name
      type: string
      required: false
    - field: persona
      type: path
      required: false
    - field: shared_content
      type: list[path]   # docs/dome/flows, product-brief, brainstorming, PRD
      required: false
  output:
    - artifact: journey
      format: markdown
      schema: handoff-v1   # frontmatter con upstream + weak_sections
    - artifact: journeys-overview
      format: markdown
      schema: handoff-v1

consumes_databases: []

consumes_references:
  - references/journey-template.md   # scheletro di output (single + overview)
  - references/peak-end-theory.md

handoff:
  enabled: true
  downstream:
    - dm:flows

research_policy:
  intents: [corpus]
  trigger: gap-driven            # corpus come grounding del discovery; 3 stadi (esplicito/default/gap-driven)

consumes_contracts:
  - contract: ../dome-shared/dm-research/research-digest-schema.md
    schema_version: ">=0.1.0"    # consuma il digest corpus di dm:research-corpus

harvest_policy:
  domain: opt-in
  solution: opt-in
  method: auto-on-finalize   # emette [[harvest:finalize skill=dm-journeys]]: il trigger engine propone dome:harvest --method a fine skill

status: in-sync
evolution_log:
  - version: 0.7.0
    date: 2026-06-19
    type: minor
    summary: >
      Stima del perimetro upfront (feedback utente: avviando una journey da zero non si sa
      quante siano previste). La Discovery ora deduce il set di journey candidate (persona ×
      scenario/obiettivo) e lo presenta come tabella ~N prima del loop, in guided/yolo —
      stima orientativa, mai un cap; headless lo registra solo nel report. Aggiunti sezione
      "Stima del perimetro", regola dedicata e riga "Perimetro: M/N" nel report.
  - version: 0.6.0
    date: 2026-06-13
    type: minor
    summary: >
      Gap CORE chiusi dopo validazione canonica via dm:research-practices: aggiunto
      owner interno alle Design Recommendations (Zona C di NN/g: chi possiede
      l'opportunità) e nota di grounding emotivo (emozioni non ancorate a evidenza →
      weak_sections; curva onesta, non desiderata — anti-pattern "emozioni da opinione
      interna"). learning_collegati: validazione dm:research-practices.
  - version: 0.5.0
    date: 2026-06-13
    type: minor
    summary: >
      Template di output estratto nelle references (references/journey-template.md,
      single + overview): la SKILL linka lo scheletro invece di inlinarlo (nota test
      11-06). Validato via ricerca UX (modello NN/g a 3 zone): aggiunta la riga CORE
      "Aspettative iniziali" al Contesto per completare la lens (gap atteso vs vissuto,
      aggancia il Peak-End). consumes_references popolato.
      learning_collegati: .notes/test/11-06-test-aletti-cc.md.
  - version: 0.4.0
    date: 2026-06-10
    type: minor
    summary: >
      Merge delle due linee parallele (riconciliazione corpus-index). Da main
      (U2): conformita' al contratto handoff 02-principio-handoff@1.1.0 —
      frontmatter con role (single|overview), id e anchor di elemento,
      rigenerazione anchor-preserving. Dalla linea ricerca (B5/C3): grounding
      del discovery via dm:research-corpus (research_policy intent corpus +
      consumes_contracts research-digest; degradazione a scansione diretta) e
      03-principio-atomi@1.1.0 (esenzione grounding di servizio). Le due 0.3.0
      parallele convergono qui. implements: 03@1.1.0 + 02@1.1.0.
  - version: 0.3.0
    date: 2026-06-09
    type: minor
    summary: >
      Conformità al contratto handoff (02-principio-handoff@1.1.0): frontmatter di
      output con produced_by/produced_at/principle_versions/type/process/upstream,
      role (single|overview) e id. Anchor: colonna id sulle fasi (p.), {#r.} sulle
      design-recommendation, {#finding.} sui finding dell'overview. Rigenerazione
      anchor-preserving. Parte di U2 del piano dm:blueprint v0.3.
  - version: 0.2.0
    date: 2026-06-05
    type: minor
    summary: >
      Refactor della modalità di interazione verso il dome-method. Asse unico
      guided/yolo/headless (rimossi i facilitation level beginner/intermediate/expert).
      Il pattern "deduci 5-7 fasi -> presenta tabella -> verifica" (prima riservato
      alla modalità expert) diventa il default guided. Discovery assorbe
      persona/flows/brief/brainstorm e dichiara i gap. Sentiment Timeline e Review
      Peak-End mantenute; handoff con upstream + weak_sections.
  - version: 0.1.0
    date: 2026-06-05
    type: initial
    summary: >
      Prima versione manifestata. Atomo-dominio di design-research derivato dal
      processo meepo-plugin (behavioral-ux / peak-end) e allineato al dome-method
      v2: aggiunto manifest L4, output spostato sotto docs/dome/journeys/, lookup
      personas aggiornato a docs/dome/personas/. L'analisi Peak-End (Kahneman), la
      scala emozioni -2/+3 e la Sentiment Timeline restano nelle references;
      nessuna dipendenza dal plugin meepo.
