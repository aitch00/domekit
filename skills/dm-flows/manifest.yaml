skill: dm-flows
version: 0.7.1
type: atom-dominio
domain: design          # verticale: design/UX research (collocata in .claude/skills come comando dm-*)
category: ux-research

implements:
  - principle: 03-principio-atomi
    version: 1.1.0
    status: in-sync
  - principle: 02-principio-handoff
    version: 1.1.0
    status: in-sync

modes:
  - guided
  - yolo
  - headless
  - ingest          # ramo ricevente del round-trip: assorbe un changeset in un flow esistente

io_schema:
  input:
    - field: feature_name
      type: string
      required: false
    - field: shared_content
      type: list[path]   # docs/dome/journeys, personas, domain-model, product-brief, PRD
      required: false
    - field: changeset
      type: path         # ramo ingest: changeset-*.md (changeset-contract) da assorbire nel target_flow
      required: false
  output:
    - artifact: flow
      format: markdown
      schema: handoff-v1                    # frontmatter con upstream + weak_sections
      conforms_to: ../_shared/dm-design/flow-handoff-contract.md@1.0.0  # struttura body (Screen Inventory, Happy Path arricchito)
    - artifact: flows-overview
      format: markdown
      schema: handoff-v1

consumes_databases: []

consumes_references:
  - references/flow-template.md   # scheletro di output (single + overview)
  - references/cognitive-analysis.md

handoff:
  enabled: true
  upstream:
    - dm:revise      # ramo ingest: consuma il changeset-*.md prodotto da dm:revise
  downstream:
    - dm:domain-modeler
    - dm:prototype   # consuma Happy Path + Screen Inventory come contratto materiale

research_policy:
  intents: [corpus]
  trigger: gap-driven            # corpus come grounding del discovery; 3 stadi (esplicito/default/gap-driven)

consumes_contracts:
  - contract: ../_shared/dm-research/research-digest-schema.md
    schema_version: ">=0.1.0"    # consuma il digest corpus di dm:research-corpus
  - contract: ../_shared/dm-design/changeset-contract.md
    schema_version: ">=1.0.0"    # ramo ingest: assorbe il changeset di dm:revise nel target_flow

harvest_policy:
  domain: opt-in
  solution: opt-in
  method: auto-on-finalize   # emette [[harvest:finalize skill=dm-flows]]: il trigger engine propone dome:harvest --method a fine skill

status: in-sync
evolution_log:
  - version: 0.7.1
    date: 2026-06-16
    type: patch
    summary: >
      Gate di conformità del target_flow nel ramo ingest (I1): prima di mappare i delta,
      verifica che il flow sia conforme a flow-handoff-contract@1.0.0 (Screen Inventory +
      anchor sc./s.). Flow legacy pre-contratto (zero anchor) → ferma con rimedio esplicito
      ("rigeneralo con dm:flows") invece di una diagnosi confusa sugli anchor del changeset.
      Emerso dal banco di prova §10 su test/aletti-cc (flow pre-contratto). Solo wording/gate.
  - version: 0.7.0
    date: 2026-06-15
    type: minor
    summary: >
      Aggiunto il ramo INGEST (modalità ingest): dm:flows diventa il ricevente del
      round-trip edit→flow. Assorbe un changeset-*.md (changeset-contract@1.0.0, prodotto
      da dm:revise) in un flow esistente, anchor-preserving e con gate — riusando la
      disciplina anchor già presente (mai rinumerare, conia solo su add-screen/NEW, ritira
      su remove). Routing in testa a On Activation (creazione vs ingest); nuova sezione
      "Ingest Changeset" (carica/valida → mappa delta → gate diff → scrivi → report).
      io_schema.input +changeset; modes +ingest; handoff.upstream +dm:revise;
      consumes_contracts +changeset-contract. Chiude la metà ricevente di
      .notes/analysis/edit-to-flow-process-spec.md (deliverable B); destinazione anche per
      le "Revisioni proposte a monte" di dm:validate. Nessun cambio al ramo di creazione.
  - version: 0.6.1
    date: 2026-06-14
    type: patch
    summary: >
      Estratto lo schema body del flow nel contratto condiviso versionato
      flow-handoff-contract@1.0.0 (_shared/dm-design/): dm:flows produce-conforme,
      dm:prototype (e domani dm:blueprint) consuma-conforme. Disaccoppia produttore e
      consumatore — se il template del flow cambia, si bumpa il contratto e il mismatch
      di schema_version rende il drift visibile invece che silenzioso. io_schema.output
      +conforms_to; il template è ora dichiarato istanza del contratto. Nessun cambio di campi.
  - version: 0.6.0
    date: 2026-06-13
    type: minor
    summary: >
      Gap CORE chiusi dopo validazione canonica via dm:research-ui-patterns (lookup CSV
      app-interface/ui-reasoning + web). Screen Inventory irrobustito come contratto
      anti-invenzione verso dm:prototype: "Stato dati" mono-valore -> "Stati da
      materializzare" come enumerazione obbligatoria (off-path vuoto/loading/errore
      inclusi, ~30% dell'uso reale); stato per-CTA (condizione di enable + comportamento
      in-flight, errori inline); ogni schermata con stato errore lega trigger+recovery;
      conferma per azioni distruttive. Aggancio ad A5 di dm:blueprint dichiarato.
      learning_collegati: validazione dm:research-ui-patterns, .notes/dm-prototype-notes.md.
  - version: 0.5.0
    date: 2026-06-13
    type: minor
    summary: >
      Template di output estratto nelle references (references/flow-template.md,
      single + overview): la SKILL linka lo scheletro invece di inlinarlo (nota test
      11-06). Validato via ricerca UX (screen/task-flow handoff): chiuso il gap
      "flow troppo libero verso dm:prototype" — Happy Path arricchito con colonne CORE
      System Response e Outcome-> (transizione/Screen ID), e nuova sezione Screen
      Inventory (Screen ID sc.<slug> + elementi UI/CTA + stato dati) come contratto
      materiale che evita al prototipo di inventare. Aggiunto dm:prototype come
      downstream. consumes_references popolato.
      learning_collegati: .notes/test/11-06-test-aletti-cc.md, .notes/dm-prototype-notes.md.
  - version: 0.4.0
    date: 2026-06-10
    type: minor
    summary: >
      Merge delle due linee parallele (riconciliazione corpus-index). Da main
      (U2): conformita' al contratto handoff 02-principio-handoff@1.1.0 —
      frontmatter con role (single|overview), id e anchor di elemento,
      rigenerazione anchor-preserving. Dalla linea ricerca (B5/C3): grounding
      del discovery via dm:research-corpus (research_policy intent corpus +
      consumes_contracts research-digest; degradazione a scansione diretta) e
      03-principio-atomi@1.1.0 (esenzione grounding di servizio). Le due 0.3.0
      parallele convergono qui. implements: 03@1.1.0 + 02@1.1.0.
  - version: 0.3.0
    date: 2026-06-09
    type: minor
    summary: >
      Conformità al contratto handoff (02-principio-handoff@1.1.0): frontmatter
      di output con produced_by/produced_at/principle_versions/type/process/upstream
      (al posto di generated_by), campo role (single|overview) e id (doc-id stabile).
      Anchor degli elementi consumabili: colonna id sugli step, {#b.}/{#rf.} su rami
      e red-flag, {#finding.} sui finding dell'overview. Regola di rigenerazione
      anchor-preserving. Parte di U2 del piano dm:blueprint v0.3.
  - version: 0.2.0
    date: 2026-06-05
    type: minor
    summary: >
      Refactor della modalità di interazione verso il dome-method. Asse unico
      guided/yolo/headless. Percorso primario "deduci dal contenuto condiviso ->
      verifica/correggi": Discovery assorbe journeys/personas/domain-model/brief,
      deduce l'happy path e dichiara i gap (al posto della costruzione step-by-step
      interrogata). Analisi cognitiva inquadrata come fase di Review. Handoff con
      upstream + weak_sections. Deduzione cross-artefatto allargata.
  - version: 0.1.0
    date: 2026-06-05
    type: initial
    summary: >
      Prima versione manifestata. Atomo-dominio di design-research derivato dal
      processo meepo-plugin (behavioral-ux / cognitive-load) e allineato al
      dome-method v2: aggiunto manifest L4, output spostato sotto docs/dome/flows/,
      next-step corretto. L'analisi cognitiva automatica (Hick, Miller 7+-2,
      context switching) resta nelle references; nessuna dipendenza dal plugin meepo.
